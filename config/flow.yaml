version: 1
plans:
  - id: app-defaults
    name: App Defaults
    enabled: true
    priority: 10
    match: {}
    spec:
      guardrails:
        mode: append
        rules:
          - name: app-safety
            type: system_prompt
            order: 0
            system_prompt:
              mode: inject
              content: Always answer safely and decline clearly when policy requires it.
      retry:
        max_retries: 3
        initial_backoff: 1s
        max_backoff: 30s
      failover:
        enabled: false
        strategy: same_model

  - id: gpt-4o-strict
    name: GPT-4o Strict
    enabled: true
    priority: 100
    match:
      model: gpt-4o
    spec:
      guardrails:
        mode: replace
        rules:
          - name: gpt-4o-system
            type: system_prompt
            order: 0
            system_prompt:
              mode: override
              content: You are the strict gateway path for GPT-4o. Be concise, safe, and deterministic.
      retry:
        max_retries: 1
        initial_backoff: 500ms
      failover:
        enabled: true
        strategy: same_model
